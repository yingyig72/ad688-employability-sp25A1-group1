<!--
  Animated Hiring Arcs — 3D map with deck.gl
  ============================================
  Drop this into index.qmd inside a ```{=html} ... ``` block.
  Requires hiring_timeline.json deployed alongside the page.

  Polish pass:
    - No Carto basemap; renders subtle US state outlines instead
    - Smooth arc transitions when month changes
    - Feathered edges via radial mask so it blends into the page
    - Auto camera rotation when idle, pauses on user interaction
    - Minimal floating overlays instead of heavy legend boxes
-->

<div id="hiring-viz-wrap" style="font-family: system-ui, sans-serif; margin: 2em 0;">
  <div id="viz-frame" style="
      position: relative;
      width: 100%;
      height: 540px;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #141b2e 0%, #0a0e1a 55%, rgba(10,14,26,0) 100%);
      -webkit-mask-image: radial-gradient(ellipse 75% 80% at center, black 55%, transparent 100%);
      mask-image: radial-gradient(ellipse 75% 80% at center, black 55%, transparent 100%);
    ">
    <div id="deck-container" style="position: absolute; inset: 0;"></div>

    <!-- Overlay: title + stats -->
    <div id="viz-overlay" style="position: absolute; top: 22px; left: 26px; color: white; pointer-events: none; text-shadow: 0 2px 8px rgba(0,0,0,0.9); z-index: 2;">
      <div style="font-size: 0.72em; opacity: 0.55; letter-spacing: 0.18em; text-transform: uppercase;">Hiring Activity</div>
      <div id="viz-quarter" style="font-size: 2.2em; font-weight: 300; margin-top: 4px; letter-spacing: -0.01em;">—</div>
      <div id="viz-stats" style="font-size: 0.88em; opacity: 0.75; margin-top: 6px; font-weight: 300;"></div>
    </div>

    <!-- Minimal legend -->
    <div style="position: absolute; bottom: 22px; right: 26px; color: white; font-size: 0.75em; opacity: 0.7; pointer-events: none; z-index: 2; text-align: right; text-shadow: 0 1px 3px rgba(0,0,0,0.8);">
      <div style="display: flex; align-items: center; justify-content: flex-end; gap: 8px; margin-bottom: 4px;">
        <span>in-person</span>
        <span style="width: 40px; height: 2px; background: linear-gradient(to right, #3b82f6, #f59e0b); display: inline-block;"></span>
        <span>remote</span>
      </div>
      <div style="opacity: 0.7;">arc height = posting volume</div>
    </div>

    <!-- Tooltip -->
    <div id="viz-tooltip" style="position: absolute; pointer-events: none; background: rgba(10,14,26,0.92); color: white; padding: 8px 12px; border-radius: 6px; font-size: 0.85em; display: none; backdrop-filter: blur(6px); z-index: 3; border: 1px solid rgba(255,255,255,0.1);"></div>
  </div>

  <!-- Controls -->
  <div style="margin-top: 16px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; padding: 0 8px;">
    <button id="viz-play" style="padding: 0.55em 1.3em; font-size: 0.9em; border: none; border-radius: 999px; background: #2563eb; color: white; cursor: pointer; min-width: 100px; font-weight: 500;">▶ Play</button>
    <input id="viz-slider" type="range" min="0" max="0" value="0" step="1" style="flex: 1; min-width: 200px; accent-color: #2563eb;" />
    <span id="viz-slider-label" style="font-size: 0.9em; color: #555; min-width: 90px; text-align: right; font-variant-numeric: tabular-nums;">—</span>
  </div>

  <p style="font-size: 0.85em; color: #666; margin-top: 12px; padding: 0 8px;">
    Hiring activity across major U.S. metros during mid-2024. Arc height shows posting volume; color shows the share of remote roles. Drag to rotate, scroll to zoom, and press play to animate across months.
  </p>
</div>

<script src="https://unpkg.com/deck.gl@8.9.33/dist.min.js"></script>
<script>
(function () {
  const state = {
    timeline: null,
    quarterIdx: 0,
    playing: false,
    deck: null,
    animationId: null,
    autoRotate: true,
    bearing: 0,
    lastInteraction: 0,
  };

  const elQuarter = document.getElementById("viz-quarter");
  const elStats = document.getElementById("viz-stats");
  const elSlider = document.getElementById("viz-slider");
  const elSliderLabel = document.getElementById("viz-slider-label");
  const elPlay = document.getElementById("viz-play");
  const elTooltip = document.getElementById("viz-tooltip");

  // ---- Load data ----
  fetch("hiring_timeline.json")
    .then(r => r.json())
    .then(data => {
      state.timeline = data;
      initViz();
    })
    .catch(err => {
      document.getElementById("deck-container").innerHTML =
        '<div style="color:white;padding:20px;">Could not load hiring_timeline.json.</div>';
      console.error(err);
    });

  function initViz() {
    const { quarters } = state.timeline;
    elSlider.max = quarters.length - 1;
    elSlider.value = 0;

    state.deck = new deck.Deck({
      parent: document.getElementById("deck-container"),
      initialViewState: {
        longitude: -96,
        latitude: 39,
        zoom: 3.5,
        pitch: 55,
        bearing: 0,
      },
      controller: true,
      layers: buildLayers(0),
      onViewStateChange: ({ viewState, interactionState }) => {
        if (interactionState.isDragging || interactionState.isZooming) {
          state.autoRotate = false;
          state.lastInteraction = performance.now();
        }
        state.bearing = viewState.bearing;
        return viewState;
      },
      onHover: ({ object, x, y }) => {
        if (object && object.city) {
          elTooltip.style.display = "block";
          elTooltip.style.left = x + 14 + "px";
          elTooltip.style.top = y + 14 + "px";
          const remotePct = Math.round(object.remote_share * 100);
          elTooltip.innerHTML =
            `<strong>${object.city}</strong><br>` +
            `${object.postings.toLocaleString()} postings<br>` +
            `${remotePct}% remote`;
        } else {
          elTooltip.style.display = "none";
        }
      },
    });

    updateOverlay(0);
    startAutoRotate();
  }

  function buildLayers(idx) {
    const quarters = state.timeline.quarters;
    const q = quarters[idx];
    const rows = state.timeline.data[q];
    const center = state.timeline.center;
    const maxPostings = Math.max(...rows.map(r => r.postings));

    // Sort by volume so bigger arcs render on top
    const sorted = [...rows].sort((a, b) => a.postings - b.postings);

    return [
      // Subtle US state outlines — no basemap tiles
      new deck.GeoJsonLayer({
        id: "states-geojson",
        data: "https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json",
        stroked: true,
        filled: true,
        getFillColor: [30, 41, 59, 160],
        getLineColor: [100, 116, 139, 90],
        lineWidthMinPixels: 0.5,
      }),
      // City dots
      new deck.ScatterplotLayer({
        id: "cities",
        data: sorted,
        getPosition: d => [d.lon, d.lat],
        getRadius: d => 2000 + (d.postings / maxPostings) * 14000,
        getFillColor: d => [...colorForRemote(d.remote_share), 230],
        pickable: true,
        stroked: false,
        radiusUnits: "meters",
        transitions: { getRadius: 800, getFillColor: 800 },
      }),
      // Arcs from center to each city
      new deck.ArcLayer({
        id: "arcs",
        data: sorted,
        getSourcePosition: () => [center.lon, center.lat],
        getTargetPosition: d => [d.lon, d.lat],
        getSourceColor: [255, 255, 255, 30],
        getTargetColor: d => [...colorForRemote(d.remote_share), 200],
        getWidth: d => 0.8 + (d.postings / maxPostings) * 4.5,
        getHeight: d => 0.35 + (d.postings / maxPostings) * 0.9,
        pickable: true,
        greatCircle: false,
        // Smooth animated transitions when the month changes
        transitions: {
          getTargetColor: { type: "interpolation", duration: 700 },
          getWidth: { type: "interpolation", duration: 700 },
          getHeight: { type: "interpolation", duration: 700 },
        },
      }),
    ];
  }

  function colorForRemote(share) {
    // Interpolate blue -> amber based on remote share
    const t = Math.min(1, Math.max(0, share));
    return [
      Math.round(59 + (245 - 59) * t),
      Math.round(130 + (158 - 130) * t),
      Math.round(246 + (11 - 246) * t),
    ];
  }

  function updateOverlay(idx) {
    const quarters = state.timeline.quarters;
    const q = quarters[idx];
    const rows = state.timeline.data[q];
    const total = rows.reduce((s, r) => s + r.postings, 0);
    const weightedRemote = rows.reduce((s, r) => s + r.postings * r.remote_share, 0);
    const remotePct = total ? Math.round((weightedRemote / total) * 100) : 0;
    const topCity = [...rows].sort((a, b) => b.postings - a.postings)[0];

    // Format "2024-05" -> "May 2024"
    const [year, month] = q.split("-");
    const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun",
                        "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    const nice = `${monthNames[parseInt(month, 10) - 1]} ${year}`;

    elQuarter.textContent = nice;
    elStats.innerHTML =
      `${total.toLocaleString()} postings · ${remotePct}% remote · Top: ${topCity ? topCity.city : '—'}`;
    elSliderLabel.textContent = nice;
  }

  function setQuarter(idx) {
    state.quarterIdx = idx;
    elSlider.value = idx;
    if (state.deck) {
      state.deck.setProps({ layers: buildLayers(idx) });
    }
    updateOverlay(idx);
  }

  // ---- Auto camera rotation ----
  function startAutoRotate() {
    let last = performance.now();
    function frame(now) {
      const dt = now - last;
      last = now;

      // Resume auto-rotate after 3s of no interaction
      if (!state.autoRotate && now - state.lastInteraction > 3000) {
        state.autoRotate = true;
      }

      if (state.autoRotate && state.deck) {
        state.bearing = (state.bearing + dt * 0.005) % 360;
        state.deck.setProps({
          viewState: {
            longitude: -96,
            latitude: 39,
            zoom: 3.5,
            pitch: 55,
            bearing: state.bearing,
          },
        });
      }
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }

  // ---- Timeline playback ----
  elSlider.addEventListener("input", e => {
    if (state.playing) togglePlay();
    setQuarter(parseInt(e.target.value, 10));
  });

  function togglePlay() {
    state.playing = !state.playing;
    elPlay.textContent = state.playing ? "⏸ Pause" : "▶ Play";
    if (state.playing) tick();
    else if (state.animationId) cancelAnimationFrame(state.animationId);
  }

  let lastStep = 0;
  function tick(ts) {
    if (!state.playing) return;
    if (!ts) ts = performance.now();
    if (ts - lastStep > 1200) {  // slower — transitions take 700ms to settle
      let next = state.quarterIdx + 1;
      if (next >= state.timeline.quarters.length) next = 0;
      setQuarter(next);
      lastStep = ts;
    }
    state.animationId = requestAnimationFrame(tick);
  }

  elPlay.addEventListener("click", togglePlay);
})();
</script>
